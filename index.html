<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="description" content="Fusen Zhang - Personal Homepage" />
    <meta name="author" content="Fusen Zhang" />
    <title id="title"></title>

    <!-- Icon -->
    <link rel="icon" type="image/x-icon" href="static/assets/favicon.ico" />

    <!-- Bootstrap icons-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet" />

    <!-- Google fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />

    <!-- Core theme CSS (includes Bootstrap)-->
    <link type="text/css" href="static/css/styles.css" rel="stylesheet" />
    <link type="text/css" href="static/css/main.css?v=3.0" rel="stylesheet" />

    <!-- Bootstrap core JS-->
    <script type="text/javascript" src="static/js/bootstrap.bundle.min.js"></script>

    <!-- Markdown -->
    <script type="text/javascript" src="static/js/marked.min.js"></script>

    <!-- Mathematics -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: false,
                processEnvironments: true,
                processRefs: true,
                tags: 'all',
            }
        };
    </script>
    <script type="text/javascript" id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <!-- Core JS-->
    <script type="text/javascript" src="static/js/scripts.js"></script>
    <script type="text/javascript" src="static/js/js-yaml.min.js"></script>

</head>

<body id="page-top">

    <!-- ========== LANDING PAGE ========== -->
    <section id="landing" class="landing-page">
        <canvas id="particle-canvas"></canvas>
        <div class="landing-overlay"></div>
        <div class="landing-content">
            <div class="landing-avatar-wrapper">
                <img class="landing-avatar" src="static/assets/img/photo.jpg" alt="Fusen Zhang">
                <div class="avatar-ring"></div>
            </div>
            <h1 class="landing-title">
                <span class="greeting">Hi, I'm</span>
                <span class="name-text" id="typed-name"></span>
                <span class="cursor-blink">|</span>
            </h1>
            <p class="landing-subtitle">AI Researcher &middot; HEU &rarr; XMU &middot; LLM Enthusiast</p>
            <div class="landing-tags">
                <span class="tag"><i class="bi bi-mortarboard-fill"></i> XMU Master</span>
                <span class="tag"><i class="bi bi-robot"></i> AI &amp; LLM</span>
                <span class="tag"><i class="bi bi-trophy-fill"></i> National Awards</span>
                <span class="tag"><i class="bi bi-code-slash"></i> Full Stack</span>
            </div>
            <a href="#home" class="explore-btn" id="explore-btn">
                <span>开始探索</span>
                <i class="bi bi-arrow-down-circle"></i>
            </a>
        </div>
        <div class="scroll-indicator">
            <div class="mouse">
                <div class="wheel"></div>
            </div>
        </div>
    </section>

    <!-- ========== NAVIGATION ========== -->
    <nav class="header navbar navbar-expand-lg fixed-top" id="mainNav">
        <div class="container px-5">
            <a id="page-top-title" class="navbar-brand fw-bold" href="#landing"></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarResponsive"
                aria-controls="navbarResponsive" aria-expanded="false" aria-label="Toggle navigation">
                <i class="bi bi-list"></i>
            </button>
            <div class="collapse navbar-collapse" id="navbarResponsive">
                <ul class="navbar-nav ms-auto me-4 my-3 my-lg-0">
                    <li class="nav-item">
                        <a class="nav-link me-lg-3" href="#home">HOME</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link me-lg-3" href="#projects">PROJECTS</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link me-lg-3" href="#awards">AWARDS</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- ========== HOME ========== -->
    <section id="home" class="content-section">
        <div class="container px-5">
            <div class="section-header reveal-up">
                <span class="section-badge"><i class="bi bi-person-fill"></i> About Me</span>
                <h2 id="home-subtitle"> </h2>
            </div>
            <div class="main-body reveal-up" id="home-md"></div>
        </div>
    </section>

    <!-- ========== PROJECTS ========== -->
    <section id="projects" class="content-section section-alt">
        <div class="container px-5">
            <div class="section-header reveal-up">
                <span class="section-badge"><i class="bi bi-folder-fill"></i> Research</span>
                <h2 id="projects-subtitle">PROJECTS</h2>
            </div>
            <div class="main-body reveal-up" id="projects-md"></div>
        </div>
    </section>

    <!-- ========== AWARDS ========== -->
    <section id="awards" class="content-section">
        <div class="container px-5">
            <div class="section-header reveal-up">
                <span class="section-badge"><i class="bi bi-award-fill"></i> Honors</span>
                <h2 id="awards-subtitle">SELECTED AWARDS</h2>
            </div>
            <div class="main-body reveal-up" id="awards-md"></div>
        </div>
    </section>

    <!-- ========== FOOTER ========== -->
    <footer class="site-footer">
        <div class="container px-5">
            <div class="footer-content">
                <div class="footer-links">
                    <a href="https://github.com/zfssen" target="_blank"><i class="fab fa-github"></i></a>
                    <a href="https://www.zhihu.com/people/bruceqd/posts" target="_blank"><i class="fab fa-zhihu"></i></a>
                    <a href="mailto:zfssen@gmail.com"><i class="fas fa-envelope"></i></a>
                </div>
                <div id="copyright-text" class="footer-copyright"></div>
                <p class="footer-powered">Designed with <i class="bi bi-heart-fill" style="color:#ef4444"></i> by Fusen Zhang</p>
            </div>
        </div>
    </footer>

    <!-- Back to Top -->
    <a href="#landing" class="back-to-top" id="backToTop">
        <i class="bi bi-arrow-up"></i>
    </a>

    <!-- Custom Cursor -->
    <div class="cursor-dot" id="cursorDot"></div>
    <div class="cursor-ring" id="cursorRing"></div>
    <canvas id="click-canvas"></canvas>

</body>

</html>
